name: Testing

on:
  workflow_dispatch: 
    inputs:
      action:
        description: 'Start Test'
        default: 'Test'
  
  push:
  
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Linting & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pylint
        continue-on-error: true
        run: |
          pylint app/homepage.py --fail-under=7.0 || echo "Pylint check completed with warnings"

      - name: Run Flake8
        continue-on-error: true
        run: flake8 app/ --max-line-length=100 --count || echo "Flake8 check completed with warnings"

      - name: Run Black (check formatting)
        continue-on-error: true
        run: black --check app/ || echo "Black formatting check completed"

      - name: Run Bandit (security scan)
        continue-on-error: true
        run: |
          bandit -r app/ -f json -o bandit-report.json || echo "Bandit scan completed"

      - name: Run Safety (dependency check)
        continue-on-error: true
        run: safety check --json || echo "Safety check completed"

      - name: Run pytest
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./.coverage
          fail_ci_if_error: false

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: devops-app:test