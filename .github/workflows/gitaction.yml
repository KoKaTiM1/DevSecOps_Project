name: Terraform AWS

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  aws-terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./infra
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials A
        if: ${{ github.actor == 'KoKaTiM1' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID_A }}:role/oidc-provider
          aws-region: us-east-1

      - name: Configure AWS credentials B
        if: ${{ github.actor == 'yossef-cohen' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID_B }}:role/oidc-provider
          aws-region: us-east-1

      - name: Attach IAM policy
        run: |
          aws iam attach-role-policy \
            --role-name oidc-provider \
            --policy-arn arn:aws:iam::aws:policy/AdministratorAccess 2>&1 | grep -v "NoSuchEntity|EntityAlreadyExists" || true
        continue-on-error: true

      - name: Create backend resources
        env:
          AWS_REGION: us-east-1
        run: |
          REGION="${{ env.AWS_REGION }}"
          BUCKET="project-final-devopssec-terraform-state"

          echo "Creating S3 bucket for Terraform state..."
          aws s3 mb s3://$BUCKET --region $REGION 2>&1 | grep -v "BucketAlreadyOwnedByYou\|BucketAlreadyExists" || true

          echo "Enabling versioning on S3 bucket..."
          aws s3api put-bucket-versioning \
            --bucket $BUCKET \
            --versioning-configuration Status=Enabled \
            --region $REGION 2>/dev/null || true

          echo "Enabling encryption on S3 bucket..."
          aws s3api put-bucket-encryption \
            --bucket $BUCKET \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}' \
            --region $REGION 2>/dev/null || true
                        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init -reconfigure -input=false
        env: 
          TF_LOG: DEBUG

      - name: Terraform Plan
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan'
        run: terraform plan -input=false

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' || github.event_name.pull_request && github.event.action == 'closed' && github.event.pull_request.merged == true
        run: terraform apply -input=false -auto-approve

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: terraform destroy -input=false -auto-approve

      - name: Cleanup S3 bucket and DynamoDB table
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        env:
          AWS_REGION: us-east-1
        run: |
          set -euo pipefail

          BUCKET="project-final-devopssec-terraform-state"
          TABLE="project-terraform-locks"
          REGION="${AWS_REGION}"

          echo "Checking AWS identity..."
          aws sts get-caller-identity

          echo "Removing all object versions and delete markers from S3 bucket..."

          while true; do
            # Lists object versions and delete markers from the versioned bucket.
            aws s3api list-object-versions \
              --bucket "$BUCKET" \
              --region "$REGION" \
              --output json > versions.json

            # Counts both normal object versions and delete markers.
            COUNT=$(jq '[.Versions[]?, .DeleteMarkers[]?] | length' versions.json)

            echo "Found $COUNT versioned entries to delete."

            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            # Builds a delete request containing both object versions and delete markers.
            jq -c '{
              Objects: ([.Versions[]?, .DeleteMarkers[]?] | map({
                Key: .Key,
                VersionId: .VersionId
              })),
              Quiet: true
            }' versions.json > delete.json

            # Deletes the listed object versions and delete markers.
            aws s3api delete-objects \
              --bucket "$BUCKET" \
              --region "$REGION" \
              --delete file://delete.json
          done

          echo "Deleting S3 bucket..."
          aws s3api delete-bucket \
            --bucket "$BUCKET" \
            --region "$REGION"

          echo "Deleting DynamoDB table..."
          aws dynamodb delete-table \
            --table-name "$TABLE" \
            --region "$REGION" || true