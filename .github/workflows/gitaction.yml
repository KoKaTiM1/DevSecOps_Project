name: Terraform AWS

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  aws-terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./infra
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials A
        if: ${{ github.actor == 'KoKaTiM1' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID_A }}:role/oidc-provider
          aws-region: us-east-1

      - name: Configure AWS credentials B
        if: ${{ github.actor == 'yossef-cohen' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID_B }}:role/oidc-provider
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -input=false

      