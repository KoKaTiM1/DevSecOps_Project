name: Terraform AWS

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  aws-terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./infra
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials A
        if: ${{ github.actor == 'KoKaTiM1' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID_A }}:role/oidc-provider
          aws-region: us-east-1

      - name: Configure AWS credentials B
        if: ${{ github.actor == 'yossef-cohen' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID_B }}:role/oidc-provider
          aws-region: us-east-1

      - name: Attach IAM policy
        run: |
          aws iam attach-role-policy \
            --role-name oidc-provider \
            --policy-arn arn:aws:iam::aws:policy/AdministratorAccess 2>&1 | grep -v "NoSuchEntity|EntityAlreadyExists" || true
        continue-on-error: true

      - name: Create backend resources
        env:
          AWS_REGION: us-east-1
        run: |
          REGION="${{ env.AWS_REGION }}"
          BUCKET="project-final-devopssec-terraform-state"
          TABLE="project-terraform-locks"

          echo "Creating S3 bucket for Terraform state..."
          aws s3 mb s3://$BUCKET --region $REGION 2>&1 | grep -v "BucketAlreadyOwnedByYou\|BucketAlreadyExists" || true

          echo "Enabling versioning on S3 bucket..."
          aws s3api put-bucket-versioning --bucket $BUCKET --versioning-configuration Status=Enabled --region $REGION 2>/dev/null || true

          echo "Enabling encryption on S3 bucket..."
          aws s3api put-bucket-encryption --bucket $BUCKET --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}' --region $REGION 2>/dev/null || true

          echo "Creating DynamoDB table for Terraform locks..."
          aws dynamodb create-table \
            --table-name $TABLE \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region $REGION 2>&1 | grep -v "ResourceInUseException" || true
            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init -reconfigure -input=false
        env: 
          TF_LOG: DEBUG

      - name: Terraform Plan
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan'
        run: terraform plan -input=false

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: terraform destroy -input=false -auto-approve
