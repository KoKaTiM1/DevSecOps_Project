<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ info.name }} | Profile</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="profile-page">
  <main class="profile-shell">
    <section class="profile-detail-card">
      <div class="profile-orb profile-orb-left" aria-hidden="true"></div>
      <div class="profile-orb profile-orb-right" aria-hidden="true"></div>

      {% if photo %}
      <div class="profile-photo-wrap">
        <img src="{{ url_for('static', filename=photo) }}" class="profile-detail-img" alt="{{ info.name }}">
      </div>
      {% endif %}

      <p class="profile-kicker">Team Profile</p>
      <h1 class="profile-title">{{ info.name }}</h1>
      <p class="profile-role-pill">{{ info.role }}</p>

      <p class="profile-bio">{{ info.bio }}</p>

      <div class="profile-actions">
        <a href="{{ url_for('homepage') }}" class="btn btn-primary">Back to Home</a>
      </div>
    </section>
  </main>
</body>
</html>
